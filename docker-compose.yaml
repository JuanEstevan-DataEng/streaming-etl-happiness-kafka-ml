# Docker Compose for the workshop infrastructure: Zookeeper, Kafka, MySQL
# ES: Docker Compose para la infraestructura del workshop: Zookeeper, Kafka, MySQL

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ws3_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ws3_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Advertised listener must point to localhost so host-side Python clients can connect
      # ES: El advertised listener apunta a localhost para que los clientes Python del host conecten
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  mysql:
    image: mysql:8.0
    container_name: ws3_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Auto-initialize schema on first boot
      # ES: Inicializa el schema automáticamente en el primer arranque
      - ./sql/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql:ro

volumes:
  mysql_data:
